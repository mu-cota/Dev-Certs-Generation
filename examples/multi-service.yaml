output_root: "output"

ca_country: "SG"
ca_state: "Singapore"
ca_locality: "Singapore"
ca_organization: "Example Bank"
ca_ou: "Shared Services"
ca_common_name: "Example Bank Shared Services CA"
ca_validity_days: "730"
ca_curve: "secp384r1"

default_country: "SG"
default_state: "Singapore"
default_locality: "Singapore"
default_organization: "Example Bank"
